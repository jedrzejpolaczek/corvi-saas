# version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: corvi
      POSTGRES_USER: corvi
      POSTGRES_PASSWORD: corvi123
    ports:
      - "5432:5432"  # Add port mapping for debugging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corvi"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - corvi-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # Add port mapping
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - corvi-network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: corvi
      RABBITMQ_DEFAULT_PASS: corvi123
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - corvi-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - corvi-network

  mlflow:
    image: python:3.11-slim
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://corvi:corvi123@postgres:5432/corvi
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://mlflow/artifacts
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: |
      bash -c "
      apt-get update && apt-get install -y curl &&
      pip install mlflow psycopg2-binary &&
      mlflow server --backend-store-uri postgresql://corvi:corvi123@postgres:5432/corvi --default-artifact-root s3://mlflow/artifacts --host 0.0.0.0 --port 5000 --serve-artifacts
      "
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - corvi-network

  api:
    build:
      context: ../corvi_api  # Change from ../backend to ../corvi_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://corvi:corvi123@postgres:5432/corvi
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://corvi:corvi123@rabbitmq:5672/
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - corvi-network

  # Comment out worker temporarily to fix build issues
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: corvi_worker/Dockerfile
  #   environment:
  #     DATABASE_URL: postgresql://corvi:corvi123@postgres:5432/corvi
  #     REDIS_URL: redis://redis:6379
  #     RABBITMQ_URL: amqp://corvi:corvi123@rabbitmq:5672
  #     MINIO_ENDPOINT: minio:9000
  #     MINIO_ACCESS_KEY: minioadmin
  #     MINIO_SECRET_KEY: minioadmin
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #   depends_on:
  #     - api
  #     - rabbitmq
  #     - redis

  frontend:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../corvi_frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - corvi-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - corvi-network

volumes:
  postgres_data:
  minio_data:
  grafana_data:

networks:
  corvi-network:
    driver: bridge