version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: corvi
      POSTGRES_PASSWORD: corvi
      POSTGRES_DB: corvi
    ports: ["5432:5432"]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U corvi"], interval: 5s, timeout: 5s, retries: 10 }

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672","15672:15672"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000","9001:9001"]
    volumes: ["minio_data:/data"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root s3://corvi
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on: [minio]
    ports: ["5000:5000"]

  api:
    build: { context: .., dockerfile: infra/Dockerfile.api }
    environment:
      DATABASE_URL: postgresql+psycopg2://corvi:corvi@postgres:5432/corvi
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: corvi
      QUEUE_BACKEND: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [postgres, rabbitmq, redis, minio, mlflow]
    ports: ["8000:8000"]

  worker:
    build: { context: .., dockerfile: infra/Dockerfile.worker }
    environment:
      DATABASE_URL: postgresql+psycopg2://corvi:corvi@postgres:5432/corvi
      QUEUE_BACKEND: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
    depends_on: [api]

  dashboard:
    build: { context: .., dockerfile: infra/Dockerfile.dashboard }
    ports: ["9002:8000"]

  frontend:
    build: { context: .., dockerfile: infra/Dockerfile.frontend }
    volumes:
      - frontend_dist:/usr/share/nginx/html
    environment:
      VITE_API_URL: /api
    depends_on: [api]

  nginx:
    image: nginx:1.25
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html
    ports: ["80:80"]
    depends_on: [frontend]

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.4.2
    ports: ["3000:3000"]

volumes:
  minio_data:
  frontend_dist:
